[agent]
  interval = "10s"
  round_interval = true
  flush_interval = "10s"

########################################
# INPUT: collectd from OpenWrt
########################################

[[inputs.socket_listener]]
  service_address = "udp://:25826"
  data_format = "collectd"

########################################
# OUTPUT: InfluxDB
########################################

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "collectd"
