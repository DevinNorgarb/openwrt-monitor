BaseDir "/var/run/collectd"
#Include "/etc/collectd/conf.d/*.conf"
PIDFile "/var/run/collectd.pid"
PluginDir "/usr/lib/collectd"
TypesDB "/usr/share/collectd/types.db"
Interval 10
ReadThreads 10

LoadPlugin conntrack

LoadPlugin contextswitch

LoadPlugin cpu
<Plugin cpu>
	ValuesPercentage true
	ReportByCpu true
	ReportByState true
</Plugin>

LoadPlugin cpufreq

LoadPlugin dhcpleases
<Plugin dhcpleases>
	Path "/tmp/dhcp.leases"
</Plugin>

LoadPlugin dns
<Plugin dns>
	Interface "br-lan"
	Interface "eth0"
	Interface "eth1"
	Interface "pppoe-wan"
	Interface "tun0"
	Interface "phy0-ap0"
	Interface "phy1-ap0"
	IgnoreSource "127.0.0.1"
</Plugin>

# Whitelist: only these netdevs (if one is absent on your board, remove that line).
LoadPlugin interface
<Plugin interface>
	Interface "br-lan"
	Interface "eth0"
	Interface "eth1"
	Interface "pppoe-wan"
	Interface "tun0"
	Interface "phy0-ap0"
	Interface "phy1-ap0"
</Plugin>

LoadPlugin ipstatistics

# Match AP VIFs from `iw dev` (e.g. phy0-ap0 / phy1-ap0).
LoadPlugin iwinfo
<Plugin iwinfo>
	Interface "phy0-ap0"
	Interface "phy1-ap0"
</Plugin>

LoadPlugin load

LoadPlugin memory
<Plugin memory>
	ValuesPercentage true
</Plugin>

LoadPlugin netlink
<Plugin netlink>
	Interface "br-lan"
	Interface "eth0"
	Interface "eth1"
	Interface "pppoe-wan"
	Interface "tun0"
	Interface "phy0-ap0"
	Interface "phy1-ap0"
	VerboseInterface "br-lan"
	VerboseInterface "eth0"
	VerboseInterface "eth1"
	VerboseInterface "pppoe-wan"
	VerboseInterface "tun0"
	VerboseInterface "phy0-ap0"
	VerboseInterface "phy1-ap0"
</Plugin>

# Set Server to the LAN IP of the host running Docker / Telegraf (see README).
LoadPlugin network
<Plugin network>
	Server "92.4.128.201" "25826"
	Forward true
	ReportStats true
</Plugin>

LoadPlugin ping
<Plugin ping>
	TTL 127
	Interval 30
	Host "8.8.8.8"
	Host "8.8.4.4"
</Plugin>

LoadPlugin processes
<Plugin processes>
	Process "uhttpd"
	Process "dnsmasq"
	Process "dropbear"
</Plugin>

LoadPlugin rrdtool
<Plugin rrdtool>
	DataDir "/tmp/rrd"
	RRARows 288
	RRASingle true
	RRATimespan 7200
	RRATimespan 86400
	RRATimespan 604800
	RRATimespan 2678400
	RRATimespan 31622400
</Plugin>

LoadPlugin syslog
<Plugin syslog>
	LogLevel "debug"
	NotifyLevel "OKAY"
</Plugin>

LoadPlugin tcpconns
<Plugin tcpconns>
	ListeningPorts true
	AllPortsSummary true
</Plugin>

# IgnoreSelected true with no ThermalDevice = collect all zones (default false would collect none).
LoadPlugin thermal
<Plugin thermal>
	IgnoreSelected true
</Plugin>

LoadPlugin uptime
