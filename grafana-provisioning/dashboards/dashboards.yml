apiVersion: 1

providers:
  - name: OpenWrt
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    # If true, Grafana can keep a UI-saved copy and ignore updated JSON on disk.
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
